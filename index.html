<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بداية النهاية - توجيهي رحلة</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
font-family:Arial;
color:white;

/* الخلفية /
background-image:url("logo.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/ طبقة تغميق خفيفة /
.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:0;
}

.content{
position:relative;
z-index:1;
}

h1{
font-size:32px;
margin-bottom:40px;
}

.timer{
display:flex;
gap:20px;
}

.box{
background:rgba(0,0,0,0.6);
padding:25px;
border-radius:12px;
min-width:100px;
}

.number{
font-size:45px;
font-weight:bold;
}

.label{
margin-top:8px;
font-size:16px;
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="content">

<h1>🔥 بداية النهاية - توجيهي رحلة</h1>

<div class="timer">

<div class="box">
<div id="days" class="number">0</div>
<div class="label">أيام</div>
</div>

<div class="box">
<div id="hours" class="number">0</div>
<div class="label">ساعات</div>
</div>

<div class="box">
<div id="minutes" class="number">0</div>
<div class="label">دقائق</div>
</div>

<div class="box">
<div id="seconds" class="number">0</div>
<div class="label">ثواني</div>
</div>

</div>

</div>

<script>

var targetDate = new Date("June 20, 2026 09:00:00").getTime();

setInterval(function(){

var now = new Date().getTime();
var distance = targetDate - now;

var days = Math.floor(distance / (1000606024));
var hours = Math.floor((distance % (1000606024)) / (10006060));
var minutes = Math.floor((distance % (10006060)) / (100060));
var seconds = Math.floor((distance % (1000*60)) / 1000);

document.getElementById("days").innerHTML = days;
document.getElementById("hours").innerHTML = hours;
document.getElementById("minutes").innerHTML = minutes;
document.getElementById("seconds").innerHTML = seconds;

},1000);

</script>

</body>
</html>
