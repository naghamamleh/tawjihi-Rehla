<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بداية النهاية - توجيهي رحلة</title>

<style>

body{
background:#0f1117;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
text-align:center;
}

h1{
margin-bottom:40px;
font-size:28px;
}

.timer{
display:flex;
gap:30px;
}

.box{
background:#1a1d24;
padding:30px;
border-radius:12px;
min-width:110px;
}

.number{
font-size:55px;
font-weight:bold;
}

.label{
margin-top:10px;
font-size:18px;
color:#bbb;
}

</style>
</head>

<body>

<h1>🔥 بداية النهاية - توجيهي رحلة</h1>

<div class="timer">

<div class="box">
<div id="days" class="number">0</div>
<div class="label">أيام</div>
</div>

<div class="box">
<div id="hours" class="number">0</div>
<div class="label">ساعات</div>
</div>

<div class="box">
<div id="minutes" class="number">0</div>
<div class="label">دقائق</div>
</div>

<div class="box">
<div id="seconds" class="number">0</div>
<div class="label">ثواني</div>
</div>

</div>

<script>

var targetDate = new Date("June 20, 2026 09:00:00").getTime();

setInterval(function(){

var now = new Date().getTime();
var distance = targetDate - now;

var days = Math.floor(distance / (1000606024));
var hours = Math.floor((distance % (1000606024)) / (10006060));
var minutes = Math.floor((distance % (10006060)) / (100060));
var seconds = Math.floor((distance % (100060)) / 1000);

document.getElementById("days").innerHTML = days;
document.getElementById("hours").innerHTML = hours;
document.getElementById("minutes").innerHTML = minutes;
document.getElementById("seconds").innerHTML = seconds;

},1000);

</script>

</body>
</html>
